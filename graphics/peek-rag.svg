<?xml version="1.0" encoding="UTF-8"?>
<svg width="900" height="230" viewBox="0 0 900 230" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6366f1"/>
    </marker>
  </defs>

  <rect width="900" height="230" fill="#0d0d0d"/>

  <text x="450" y="36" text-anchor="middle" fill="#f9fafb" font-size="15" font-weight="700" font-family="system-ui,sans-serif">Peek Deep — On-Device RAG Pipeline</text>

  <!-- Step 1: Load file -->
  <rect x="44" y="55" width="140" height="100" rx="10" fill="#111111" stroke="#252525" stroke-width="1.5"/>
  <text x="114" y="77" text-anchor="middle" fill="#6b7280" font-size="9" font-weight="700" font-family="system-ui,sans-serif" letter-spacing="1.2">LOCAL FILE</text>
  <line x1="64" y1="83" x2="164" y2="83" stroke="#252525" stroke-width="1"/>
  <text x="114" y="106" text-anchor="middle" fill="#f9fafb" font-size="13" font-weight="600" font-family="system-ui,sans-serif">Medical PDF</text>
  <text x="114" y="124" text-anchor="middle" fill="#4b5563" font-size="10" font-family="system-ui,sans-serif">never leaves device</text>

  <!-- Arrow 1 -->
  <line x1="186" y1="105" x2="212" y2="105" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 2: ragIngest -->
  <rect x="216" y="55" width="140" height="100" rx="10" fill="#0f1729" stroke="#6366f1" stroke-width="1.5"/>
  <text x="286" y="77" text-anchor="middle" fill="#818cf8" font-size="9" font-weight="700" font-family="system-ui,sans-serif" letter-spacing="1.2">QVAC SDK</text>
  <line x1="236" y1="83" x2="336" y2="83" stroke="#2d3748" stroke-width="1"/>
  <text x="286" y="103" text-anchor="middle" fill="#c7d2fe" font-size="12" font-family="'Courier New',Courier,monospace">ragIngest()</text>
  <text x="286" y="121" text-anchor="middle" fill="#818cf8" font-size="10" font-family="system-ui,sans-serif">on-device</text>
  <text x="286" y="137" text-anchor="middle" fill="#818cf8" font-size="10" font-family="system-ui,sans-serif">embeddings</text>

  <!-- Arrow 2 -->
  <line x1="358" y1="105" x2="384" y2="105" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 3: ragSearch -->
  <rect x="388" y="55" width="140" height="100" rx="10" fill="#0f1729" stroke="#6366f1" stroke-width="1.5"/>
  <text x="458" y="77" text-anchor="middle" fill="#818cf8" font-size="9" font-weight="700" font-family="system-ui,sans-serif" letter-spacing="1.2">QVAC SDK</text>
  <line x1="408" y1="83" x2="508" y2="83" stroke="#2d3748" stroke-width="1"/>
  <text x="458" y="103" text-anchor="middle" fill="#c7d2fe" font-size="12" font-family="'Courier New',Courier,monospace">ragSearch()</text>
  <text x="458" y="121" text-anchor="middle" fill="#818cf8" font-size="10" font-family="system-ui,sans-serif">top relevant</text>
  <text x="458" y="137" text-anchor="middle" fill="#818cf8" font-size="10" font-family="system-ui,sans-serif">chunks returned</text>

  <!-- Arrow 3 -->
  <line x1="530" y1="105" x2="556" y2="105" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 4: completion with chunks -->
  <rect x="560" y="55" width="140" height="100" rx="10" fill="#111111" stroke="#252525" stroke-width="1.5"/>
  <text x="630" y="77" text-anchor="middle" fill="#6b7280" font-size="9" font-weight="700" font-family="system-ui,sans-serif" letter-spacing="1.2">PROMPT BUILD</text>
  <line x1="580" y1="83" x2="680" y2="83" stroke="#252525" stroke-width="1"/>
  <text x="630" y="104" text-anchor="middle" fill="#f9fafb" font-size="11" font-family="'Courier New',Courier,monospace">chunks + question</text>
  <text x="630" y="121" text-anchor="middle" fill="#9ca3af" font-size="10" font-family="system-ui,sans-serif">injected into</text>
  <text x="630" y="137" text-anchor="middle" fill="#9ca3af" font-size="10" font-family="system-ui,sans-serif">MedPsy context</text>

  <!-- Arrow 4 -->
  <line x1="702" y1="105" x2="716" y2="105" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 5: Answer -->
  <rect x="720" y="55" width="138" height="100" rx="10" fill="#0a1a0f" stroke="#34d399" stroke-width="1.5"/>
  <text x="789" y="77" text-anchor="middle" fill="#34d399" font-size="9" font-weight="700" font-family="system-ui,sans-serif" letter-spacing="1.2">RESULT</text>
  <line x1="740" y1="83" x2="838" y2="83" stroke="#1a3a28" stroke-width="1"/>
  <text x="789" y="104" text-anchor="middle" fill="#f9fafb" font-size="12" font-weight="600" font-family="system-ui,sans-serif">MedPsy 4B</text>
  <text x="789" y="121" text-anchor="middle" fill="#9ca3af" font-size="11" font-family="system-ui,sans-serif">answers from</text>
  <text x="789" y="137" text-anchor="middle" fill="#34d399" font-size="10" font-family="system-ui,sans-serif">your document</text>

  <!-- Step badges -->
  <rect x="44" y="55" width="18" height="16" rx="3" fill="#6366f1"/>
  <text x="53" y="67" text-anchor="middle" fill="#fff" font-size="9" font-weight="700" font-family="system-ui,sans-serif">1</text>
  <rect x="216" y="55" width="18" height="16" rx="3" fill="#6366f1"/>
  <text x="225" y="67" text-anchor="middle" fill="#fff" font-size="9" font-weight="700" font-family="system-ui,sans-serif">2</text>
  <rect x="388" y="55" width="18" height="16" rx="3" fill="#6366f1"/>
  <text x="397" y="67" text-anchor="middle" fill="#fff" font-size="9" font-weight="700" font-family="system-ui,sans-serif">3</text>
  <rect x="560" y="55" width="18" height="16" rx="3" fill="#6366f1"/>
  <text x="569" y="67" text-anchor="middle" fill="#fff" font-size="9" font-weight="700" font-family="system-ui,sans-serif">4</text>
  <rect x="720" y="55" width="18" height="16" rx="3" fill="#34d399"/>
  <text x="729" y="67" text-anchor="middle" fill="#000" font-size="9" font-weight="700" font-family="system-ui,sans-serif">5</text>

  <text x="450" y="200" text-anchor="middle" fill="#374151" font-size="10" font-family="system-ui,sans-serif">File never leaves the device. Embeddings stored locally. MedPsy 4B reads only your document — no internet, no server.</text>
</svg>
