<?xml version="1.0" encoding="UTF-8"?>
<svg width="900" height="230" viewBox="0 0 900 230" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6366f1"/>
    </marker>
  </defs>

  <rect width="900" height="230" fill="#0d0d0d"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" fill="#f9fafb" font-size="15" font-weight="700" font-family="system-ui,sans-serif">AI Chat — Map Tool Calling Flow</text>

  <!-- Step 1: User Input -->
  <rect x="30" y="55" width="158" height="100" rx="10" fill="#111111" stroke="#252525" stroke-width="1.5"/>
  <text x="109" y="77" text-anchor="middle" fill="#6b7280" font-size="9" font-weight="700" font-family="system-ui,sans-serif" letter-spacing="1.2">USER INPUT</text>
  <line x1="50" y1="83" x2="168" y2="83" stroke="#252525" stroke-width="1"/>
  <text x="109" y="106" text-anchor="middle" fill="#f9fafb" font-size="14" font-weight="600" font-family="system-ui,sans-serif">"show me Paris"</text>
  <text x="109" y="128" text-anchor="middle" fill="#4b5563" font-size="10" font-family="system-ui,sans-serif">typed in AI Chat</text>

  <!-- Arrow 1 -->
  <line x1="190" y1="105" x2="236" y2="105" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 2: completion with tools -->
  <rect x="240" y="55" width="178" height="100" rx="10" fill="#0f1729" stroke="#6366f1" stroke-width="1.5"/>
  <text x="329" y="77" text-anchor="middle" fill="#818cf8" font-size="9" font-weight="700" font-family="system-ui,sans-serif" letter-spacing="1.2">QVAC SDK</text>
  <line x1="260" y1="83" x2="398" y2="83" stroke="#2d3748" stroke-width="1"/>
  <text x="329" y="101" text-anchor="middle" fill="#c7d2fe" font-size="11" font-family="'Courier New',Courier,monospace">completion({</text>
  <text x="329" y="118" text-anchor="middle" fill="#c7d2fe" font-size="11" font-family="'Courier New',Courier,monospace">  tools: [show_map]</text>
  <text x="329" y="135" text-anchor="middle" fill="#c7d2fe" font-size="11" font-family="'Courier New',Courier,monospace">})</text>

  <!-- Arrow 2 -->
  <line x1="420" y1="105" x2="466" y2="105" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 3: toolCall event -->
  <rect x="470" y="55" width="178" height="100" rx="10" fill="#111111" stroke="#252525" stroke-width="1.5"/>
  <text x="559" y="77" text-anchor="middle" fill="#6b7280" font-size="9" font-weight="700" font-family="system-ui,sans-serif" letter-spacing="1.2">MODEL RESPONDS</text>
  <line x1="490" y1="83" x2="628" y2="83" stroke="#252525" stroke-width="1"/>
  <text x="559" y="101" text-anchor="middle" fill="#f9fafb" font-size="11" font-family="'Courier New',Courier,monospace">toolCall event</text>
  <text x="559" y="118" text-anchor="middle" fill="#9ca3af" font-size="10" font-family="'Courier New',Courier,monospace">name: "show_map"</text>
  <text x="559" y="134" text-anchor="middle" fill="#9ca3af" font-size="10" font-family="'Courier New',Courier,monospace">location: "Paris"</text>

  <!-- Arrow 3 -->
  <line x1="650" y1="105" x2="696" y2="105" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 4: Map renders -->
  <rect x="700" y="55" width="168" height="100" rx="10" fill="#0a1a0f" stroke="#34d399" stroke-width="1.5"/>
  <text x="784" y="77" text-anchor="middle" fill="#34d399" font-size="9" font-weight="700" font-family="system-ui,sans-serif" letter-spacing="1.2">RESULT</text>
  <line x1="720" y1="83" x2="848" y2="83" stroke="#1a3a28" stroke-width="1"/>
  <text x="784" y="107" text-anchor="middle" fill="#f9fafb" font-size="13" font-weight="600" font-family="system-ui,sans-serif">Map renders inline</text>
  <text x="784" y="127" text-anchor="middle" fill="#34d399" font-size="11" font-family="system-ui,sans-serif">in the chat bubble</text>

  <!-- Step badges -->
  <rect x="30" y="55" width="22" height="18" rx="4" fill="#6366f1"/>
  <text x="41" y="68" text-anchor="middle" fill="#fff" font-size="10" font-weight="700" font-family="system-ui,sans-serif">1</text>
  <rect x="240" y="55" width="22" height="18" rx="4" fill="#6366f1"/>
  <text x="251" y="68" text-anchor="middle" fill="#fff" font-size="10" font-weight="700" font-family="system-ui,sans-serif">2</text>
  <rect x="470" y="55" width="22" height="18" rx="4" fill="#6366f1"/>
  <text x="481" y="68" text-anchor="middle" fill="#fff" font-size="10" font-weight="700" font-family="system-ui,sans-serif">3</text>
  <rect x="700" y="55" width="22" height="18" rx="4" fill="#34d399"/>
  <text x="711" y="68" text-anchor="middle" fill="#000" font-size="10" font-weight="700" font-family="system-ui,sans-serif">4</text>

  <!-- Footer -->
  <text x="450" y="200" text-anchor="middle" fill="#374151" font-size="10" font-family="system-ui,sans-serif">No regex parsing. The model calls the tool via the QVAC SDK tool calling API — result fires immediately as a toolCall event.</text>
</svg>
