<?xml version="1.0" encoding="UTF-8"?>
<svg width="900" height="210" viewBox="0 0 900 210" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6366f1"/>
    </marker>
  </defs>

  <rect width="900" height="210" fill="#0d0d0d"/>

  <!-- Title -->
  <text x="450" y="34" text-anchor="middle" fill="#f9fafb" font-size="15" font-weight="700" font-family="system-ui,sans-serif">Peek Voice — On-Device Pipeline</text>

  <!-- Step 1: Audio Input -->
  <rect x="18" y="52" width="130" height="88" rx="10" fill="#111111" stroke="#252525" stroke-width="1.5"/>
  <text x="83" y="73" text-anchor="middle" fill="#6b7280" font-size="9" font-weight="700" font-family="system-ui,sans-serif" letter-spacing="1">AUDIO INPUT</text>
  <line x1="36" y1="79" x2="130" y2="79" stroke="#252525" stroke-width="1"/>
  <text x="83" y="103" text-anchor="middle" fill="#f9fafb" font-size="13" font-weight="600" font-family="system-ui,sans-serif">Mic / File</text>
  <text x="83" y="122" text-anchor="middle" fill="#4b5563" font-size="10" font-family="system-ui,sans-serif">any audio format</text>

  <!-- Arrow 1 -->
  <line x1="150" y1="96" x2="184" y2="96" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 2: Chunking -->
  <rect x="188" y="52" width="130" height="88" rx="10" fill="#111111" stroke="#252525" stroke-width="1.5"/>
  <text x="253" y="73" text-anchor="middle" fill="#6b7280" font-size="9" font-weight="700" font-family="system-ui,sans-serif" letter-spacing="1">CHUNKING</text>
  <line x1="206" y1="79" x2="300" y2="79" stroke="#252525" stroke-width="1"/>
  <text x="253" y="100" text-anchor="middle" fill="#f9fafb" font-size="13" font-weight="600" font-family="system-ui,sans-serif">8s chunks</text>
  <text x="253" y="120" text-anchor="middle" fill="#4b5563" font-size="10" font-family="system-ui,sans-serif">with context chain</text>

  <!-- Arrow 2 -->
  <line x1="320" y1="96" x2="354" y2="96" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 3: transcribeStream -->
  <rect x="358" y="52" width="148" height="88" rx="10" fill="#0f1729" stroke="#6366f1" stroke-width="1.5"/>
  <text x="432" y="73" text-anchor="middle" fill="#818cf8" font-size="9" font-weight="700" font-family="system-ui,sans-serif" letter-spacing="1">QVAC SDK</text>
  <line x1="376" y1="79" x2="488" y2="79" stroke="#2d3748" stroke-width="1"/>
  <text x="432" y="100" text-anchor="middle" fill="#c7d2fe" font-size="11" font-family="'Courier New',Courier,monospace">transcribeStream()</text>
  <text x="432" y="120" text-anchor="middle" fill="#818cf8" font-size="10" font-family="system-ui,sans-serif">Whisper on-device</text>

  <!-- Arrow 3 -->
  <line x1="508" y1="96" x2="542" y2="96" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 4: Transcript -->
  <rect x="546" y="52" width="130" height="88" rx="10" fill="#111111" stroke="#252525" stroke-width="1.5"/>
  <text x="611" y="73" text-anchor="middle" fill="#6b7280" font-size="9" font-weight="700" font-family="system-ui,sans-serif" letter-spacing="1">TRANSCRIPT</text>
  <line x1="564" y1="79" x2="658" y2="79" stroke="#252525" stroke-width="1"/>
  <text x="611" y="100" text-anchor="middle" fill="#f9fafb" font-size="13" font-weight="600" font-family="system-ui,sans-serif">Full text</text>
  <text x="611" y="120" text-anchor="middle" fill="#4b5563" font-size="10" font-family="system-ui,sans-serif">streamed live to UI</text>

  <!-- Arrow 4 -->
  <line x1="678" y1="96" x2="712" y2="96" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 5: Explanation -->
  <rect x="716" y="52" width="166" height="88" rx="10" fill="#0a1a0f" stroke="#34d399" stroke-width="1.5"/>
  <text x="799" y="73" text-anchor="middle" fill="#34d399" font-size="9" font-weight="700" font-family="system-ui,sans-serif" letter-spacing="1">RESULT</text>
  <line x1="734" y1="79" x2="864" y2="79" stroke="#1a3a28" stroke-width="1"/>
  <text x="799" y="100" text-anchor="middle" fill="#f9fafb" font-size="12" font-weight="600" font-family="system-ui,sans-serif">MedPsy Explanation</text>
  <text x="799" y="120" text-anchor="middle" fill="#34d399" font-size="10" font-family="system-ui,sans-serif">completion() on-device</text>

  <!-- Step badges -->
  <rect x="18" y="52" width="18" height="16" rx="3" fill="#6366f1"/>
  <text x="27" y="64" text-anchor="middle" fill="#fff" font-size="9" font-weight="700" font-family="system-ui,sans-serif">1</text>
  <rect x="188" y="52" width="18" height="16" rx="3" fill="#6366f1"/>
  <text x="197" y="64" text-anchor="middle" fill="#fff" font-size="9" font-weight="700" font-family="system-ui,sans-serif">2</text>
  <rect x="358" y="52" width="18" height="16" rx="3" fill="#6366f1"/>
  <text x="367" y="64" text-anchor="middle" fill="#fff" font-size="9" font-weight="700" font-family="system-ui,sans-serif">3</text>
  <rect x="546" y="52" width="18" height="16" rx="3" fill="#6366f1"/>
  <text x="555" y="64" text-anchor="middle" fill="#fff" font-size="9" font-weight="700" font-family="system-ui,sans-serif">4</text>
  <rect x="716" y="52" width="18" height="16" rx="3" fill="#34d399"/>
  <text x="725" y="64" text-anchor="middle" fill="#000" font-size="9" font-weight="700" font-family="system-ui,sans-serif">5</text>

  <!-- Footer -->
  <text x="450" y="183" text-anchor="middle" fill="#374151" font-size="10" font-family="system-ui,sans-serif">No cloud. No API key. Audio never leaves the device — Whisper and MedPsy both run via the QVAC native runtime.</text>
</svg>
